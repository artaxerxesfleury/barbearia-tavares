services:
  - type: web
    name: damas-acessorios
    runtime: python
    region: oregon
    plan: free
    branch: damas
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SECRET_KEY
        generateValue: true
